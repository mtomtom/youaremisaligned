<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Room — The Focus Room</title>
  <meta name="description" content="Your focus alignment session begins.">
  <meta name="theme-color" content="#111111">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="shared-nav">
    <a href="index.html" class="logo">The Focus Room</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="game.html">Sessions</a>
      <a href="about.html">About</a>
      <a href="staff.html">Staff</a>
      <a href="faq.html">FAQ</a>
      <a href="guestbook.html">Guestbook</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div id="container">
    <!-- HUD: Room counter, phase dots, input count -->
    <div class="game-hud">
      <div class="hud-item">
        <span class="hud-label">Room</span>
        <span class="hud-value" id="room-counter">1</span>
        <span class="hud-label">/ 10</span>
      </div>
      <div class="hud-item">
        <div class="phase-dots">
          <span class="phase-dot active" id="phase-dot-1"></span>
          <span class="phase-dot" id="phase-dot-2"></span>
          <span class="phase-dot" id="phase-dot-3"></span>
        </div>
      </div>
      <div class="hud-item">
        <span class="hud-label">Inputs</span>
        <span class="hud-value" id="input-counter">0</span>
      </div>
    </div>

    <canvas id="roomCanvas" width="800" height="600"></canvas>

    <input
      id="inputBox"
      type="text"
      placeholder="type something"
      autocomplete="off"
    />
    <p class="exit-hint" id="exit-hint">type "exit" to leave the room</p>

    <a href="results.html" class="leave-room-btn" id="leave-room-btn">Leave Room</a>
  </div>

  <footer class="shared-footer">
    <p>&copy; 2025 The Focus Room</p>
    <p id="visitor-counter"></p>
    <div id="hidden-footer-links"></div>
  </footer>

  <script src="shared.js"></script>
  <script src="main.js"></script>
</body>
</html>
