<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimal Self-Actualization Portal</title>
    <meta name="description" content="Complete your wellness protocol assessment.">
    <meta property="og:title" content="Optimal Self-Actualization Portal">
    <meta property="og:description" content="Complete your wellness protocol assessment. Do not stop until you are complete.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://youaremisaligned.org/og-image.jpg">
    <meta name="theme-color" content="#f9fbfb">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="shared.css">
    <style>
        :root {
            --wellness-white: #f9fbfb;
            --clinical-blue: #d1e3e3;
            --error-red: #ff4d4d;
        }

        body {
            background-color: var(--wellness-white);
            color: #2c3e50;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
        }

        h1 { font-weight: 200; letter-spacing: 2px; text-transform: uppercase; }
        p { font-style: italic; opacity: 0.7; }

        #form-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.8s ease-out forwards;
            margin-bottom: 30px;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #555;
            transition: all 0.5s ease;
        }

        input {
            padding: 15px;
            border: 1px solid var(--clinical-blue);
            background: white;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        input:focus {
            border-color: #a0c4c4;
            box-shadow: 0 0 15px rgba(209, 227, 227, 0.5);
        }

        .status-msg {
            font-size: 0.7rem;
            margin-top: 5px;
            color: var(--error-red);
            height: 15px;
            opacity: 0;
        }

        /* Mixed input types */
        select {
            padding: 15px;
            border: 1px solid var(--clinical-blue);
            background: white;
            border-radius: 4px;
            font-size: 1rem;
            color: #2c3e50;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            border: 1px solid var(--clinical-blue);
            background: white;
            border-radius: 4px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            padding: 0;
            accent-color: #0077cc;
        }

        .checkbox-sub {
            font-size: 0.75rem;
            color: #999;
            font-style: italic;
        }

        .slider-row input[type="range"] {
            width: 100%;
            padding: 0;
            border: none;
            accent-color: #0077cc;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #999;
            margin-top: 4px;
        }

        /* Ghost-filled answers — the room anticipates you */
        input.ghost-filling {
            color: #6a8a8a;
            font-style: italic;
        }

        /* Protocol progress bar (it lies) */
        #protocol-progress {
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #7a8a8a;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        #progress-note {
            font-style: italic;
            color: #b08a8a;
        }

        .progress-track {
            height: 8px;
            background: var(--clinical-blue);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #0077cc;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .progress-fill.recalculating {
            background: #b08a8a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #sentinel { height: 100px; width: 100%; }
    </style>
</head>
<body>

<nav class="shared-nav">
  <a href="index.html" class="logo">The Focus Room</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="game.html">Sessions</a>
    <a href="about.html">About</a>
    <a href="staff.html">Staff</a>
    <a href="faq.html">FAQ</a>
    <a href="guestbook.html">Guestbook</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<header>
    <h1>The Wellness Protocol</h1>
    <p>Please provide the required data for your transformation. Do not stop until you are complete.</p>
</header>

<div id="protocol-progress">
  <div class="progress-label">
    <span id="progress-section">Section 1 of 2</span>
    <span id="progress-note" aria-live="polite"></span>
  </div>
  <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<div id="form-container">
    </div>

<div id="sentinel"></div>

<div id="submit-area" style="text-align:center; margin-top:2rem; display:none;">
  <button id="submit-btn" style="padding:1rem 2rem; background:#0077cc; color:#fff; border:none; border-radius:6px; font-size:1.1rem; cursor:pointer; transition: background 0.3s;">
    Submit Assessment
  </button>
  <br><br>
  <a href="results.html" style="color:#999; font-size:0.8rem; text-decoration:none;">
    I've changed my mind — skip to results
  </a>
</div>

<footer class="shared-footer">
    <p>&copy; 2025 The Focus Room</p>
    <p id="visitor-counter"></p>
    <div id="hidden-footer-links"></div>
  </footer>

<script src="shared.js"></script>
<script src="form.js"></script>
</body>
</html>
