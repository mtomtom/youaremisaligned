<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Alignment — The Focus Room</title>
  <meta name="description" content="Your focus alignment assessment results.">
  <meta property="og:title" content="Your Alignment — The Focus Room">
  <meta property="og:description" content="Your focus alignment assessment results.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://youaremisaligned.org/og-image.jpg">
  <meta name="theme-color" content="#111111">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a0a; color: #ccc;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding-top: 80px;
    }
    .report-card {
      max-width: 600px; width: 90%;
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 8px; padding: 2rem;
      margin-bottom: 2rem;
    }
    .report-card h1 {
      font-weight: 200; letter-spacing: 3px;
      text-transform: uppercase; color: #fff;
      text-align: center; font-size: 1.4rem;
    }
    .score-bar {
      height: 24px; background: #333;
      border-radius: 4px; overflow: hidden;
      margin: 1rem 0;
    }
    .score-fill {
      height: 100%; background: linear-gradient(90deg, #ff4d4d, #00aced);
      transition: width 1s ease;
      border-radius: 4px;
    }
    .score-label {
      text-align: center; font-size: 2rem; color: #fff; font-weight: bold;
      margin: 0.5rem 0;
    }
    .assessment {
      font-size: 0.95rem; line-height: 1.6; color: #999;
      margin: 1.5rem 0; padding: 1rem;
      border-left: 3px solid #00aced;
    }
    .btn-group {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    .btn {
      padding: 0.75rem 1.5rem; border: 1px solid #444;
      background: #222; color: #fff; text-decoration: none;
      border-radius: 6px; cursor: pointer; font-size: 0.9rem;
      transition: background 0.3s;
    }
    .btn:hover { background: #333; }
    .btn.primary { background: #0077cc; border-color: #0077cc; }
    .btn.primary:hover { background: #005fa3; }
    #certCanvas { display: none; }
  </style>
</head>
<body>

  <nav class="shared-nav">
    <a href="index.html" class="logo">The Focus Room</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="game.html">Sessions</a>
      <a href="about.html">About</a>
      <a href="staff.html">Staff</a>
      <a href="faq.html">FAQ</a>
      <a href="guestbook.html">Guestbook</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="report-card" id="report-card">
    <h1>Your Alignment Report</h1>
    <div class="score-label" id="score-label">Calculating...</div>
    <div class="score-bar"><div class="score-fill" id="score-fill"></div></div>
    <div class="assessment" id="assessment-text"></div>
    <div class="btn-group">
      <a href="index.html" class="btn primary">Return to The Focus Room</a>
      <a href="contact.html" class="btn">Schedule Another Session</a>
      <button class="btn" id="cert-btn">Download Alignment Certificate</button>
    </div>
  </div>

  <footer class="shared-footer">
    <p>&copy; 2025 The Focus Room</p>
    <p id="visitor-counter"></p>
    <div id="hidden-footer-links"></div>
  </footer>

  <canvas id="certCanvas" width="800" height="600"></canvas>

  <script src="shared.js"></script>
  <script src="results.js"></script>
</body>
</html>
