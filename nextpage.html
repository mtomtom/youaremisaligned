<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Focus Room - Next Page</title>
<meta name="description" content="Are you ready for assessment?">
<meta name="theme-color" content="#111111">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="shared.css">
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
    color: #fff;
    overflow: hidden;
  }

  #tricky-btn {
    padding: 1rem 2rem;
    font-size: 1.2rem;
    background: #0077cc;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    position: absolute;
    transition: transform 0.2s;
  }

  /* Shrink slightly on hover */
  #tricky-btn:hover {
    transform: scale(0.8);
  }
</style>
</head>
<body>

<nav class="shared-nav">
  <a href="index.html" class="logo">The Focus Room</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="game.html">Sessions</a>
    <a href="about.html">About</a>
    <a href="staff.html">Staff</a>
    <a href="faq.html">FAQ</a>
    <a href="guestbook.html">Guestbook</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<button id="tricky-btn">Continue</button>

<footer class="shared-footer">
    <p>&copy; 2025 The Focus Room</p>
    <p id="visitor-counter"></p>
    <div id="hidden-footer-links"></div>
  </footer>

<script src="shared.js"></script>
<script>
const btn = document.getElementById('tricky-btn');
const labels = ["Keep Trying", "Not Yet", "Almost..."];

let btnX = window.innerWidth / 2 - btn.offsetWidth / 2;
let btnY = window.innerHeight / 2 - btn.offsetHeight / 2;

btn.style.left = btnX + 'px';
btn.style.top = btnY + 'px';

let dodgeHandler = (e) => {
  const rect = btn.getBoundingClientRect();
  const mouseX = e.clientX;
  const mouseY = e.clientY;

  const distX = mouseX - (rect.left + rect.width / 2);
  const distY = mouseY - (rect.top + rect.height / 2);
  const distance = Math.sqrt(distX*distX + distY*distY);

  if(distance < 120){ // adjust how close before it moves
    // move button away from cursor
    const signX = distX === 0 ? 1 : Math.sign(distX);
    const signY = distY === 0 ? 1 : Math.sign(distY);
    btnX -= signX * 50;
    btnY -= signY * 50;

    // keep inside viewport
    btnX = Math.max(0, Math.min(window.innerWidth - rect.width, btnX));
    btnY = Math.max(0, Math.min(window.innerHeight - rect.height, btnY));

    btn.style.left = btnX + 'px';
    btn.style.top = btnY + 'px';
  }
};
document.addEventListener('mousemove', dodgeHandler);

// Change label randomly on hover
btn.addEventListener('mouseenter', () => {
  btn.textContent = labels[Math.floor(Math.random() * labels.length)];
});

btn.addEventListener('mouseleave', () => {
  btn.textContent = "Continue";
});

// Click to go to the game page
btn.addEventListener('click', () => {
  // Replace 'game.html' with the actual URL or relative path to your game
  window.location.href = 'form.html';
});

// Mobile: button becomes clickable after 3 seconds
if ('ontouchstart' in window) {
  setTimeout(() => {
    document.removeEventListener('mousemove', dodgeHandler);
    dodgeHandler = null;
    btn.style.position = 'static';
    btn.textContent = 'Continue';
  }, 3000);
}
</script>

</body>
</html>
