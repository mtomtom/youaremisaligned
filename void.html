  <h1 id="void-title">THE VOID</h1>

  <script src="shared.js"></script>
  <script>
    // Clear all progress but mark voidVisited.
    // Endings and the crack survive the wipe — some things the room keeps.
    const progress = FocusRoom.getProgress();
    progress.voidVisited = true;
    const preserved = ['voidVisited', 'crackFound', 'endings'];
    Object.keys(FocusRoom.defaultState).forEach(key => {
      if (!preserved.includes(key)) {
        progress[key] = FocusRoom.defaultState[key];
      }
    });
    FocusRoom.saveProgress(progress);

    // Arriving through the crack (the game's hidden ending) reads differently
    if (new URLSearchParams(window.location.search).get('crack') === '1') {
      document.getElementById('void-title').textContent = 'THE CRACK';
      document.getElementById('void-line-1').textContent = 'You chose yourself.';
      document.getElementById('void-line-2').textContent = 'The room will pretend this never happened.';
    }
  </script>
