  <script src="shared.js"></script>
  <script>
    // Clear all progress but mark voidVisited
    const progress = FocusRoom.getProgress();
    progress.voidVisited = true;
    // Reset everything else
    Object.keys(FocusRoom.defaultState).forEach(key => {
      if (key !== 'voidVisited') {
        progress[key] = FocusRoom.defaultState[key];
      }
    });
    FocusRoom.saveProgress(progress);
  </script>
